<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REXIN STORE - لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ستايل أسود فخم مخصص للأدمن متناسق تماماً مع الموقع */
        .admin-layout { margin-top: 40px; display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        @media (max-width: 768px) { .admin-layout { grid-template-columns: 1fr; } }
        
        .admin-box { 
            background: #141414; 
            border: 1px solid #1f1f1f; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .admin-box h3 { margin-bottom: 25px; border-bottom: 2px solid #fff; padding-bottom: 10px; font-size: 20px; color: #fff; }
        
        .stats-card { 
            background: #141414; 
            border: 1px solid #1f1f1f; 
            color: #fff; 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .stats-card h2 { color: #fff; font-size: 32px; margin-top: 5px; font-weight: 800; }
        
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: right; color: #fff; }
        .admin-table th, .admin-table td { padding: 14px; border-bottom: 1px solid #222; }
        .admin-table th { background-color: #0b0b0b; color: #888; font-weight: 600; }
        
        .btn-delete { background-color: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-delete:hover { background-color: #cc0000; }
        
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #222; background-color: #0b0b0b; color: #fff; border-radius: 6px; outline: none; }
        .form-group input:focus { border-color: #555; }
        
        .btn-submit { width: 100%; background-color: #ffffff; color: #000000; border: none; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-submit:hover { background-color: #111; color: #fff; border: 1px solid #fff; }
    </style>
</head>
<body>

    <header>
        <div class="container header-flex">
            <div class="logo">REXIN<span> CONTROL</span></div>
            <a href="index.html" style="color: #000; text-decoration: none; font-weight: bold; background: #fff; padding: 8px 18px; border-radius: 20px; transition: 0.3s;">عرض المتجر 🌐</a>
        </div>
    </header>

    <div class="container admin-layout">
        <div>
            <div class="stats-card">
                <p style="color: #888;">إجمالي منتجات المتجر الرجالي</p>
                <h2 id="total-products-stat">0</h2>
            </div>

            <div class="admin-box">
                <h3>إضافة قطعة جديدة</h3>
                <form id="add-product-form" onsubmit="adminAddProduct(event)">
                    <div class="form-group">
                        <label>اسم المنتج:</label>
                        <input type="text" id="prod-name" required placeholder="مثال: تيشرت أسود هودي">
                    </div>
                    <div class="form-group">
                        <label>السعر (ج.م):</label>
                        <input type="number" id="prod-price" required placeholder="مثال: 500">
                    </div>
                    <div class="form-group">
                        <label>رابط صورة المنتج الحصرية:</label>
                        <input type="text" id="prod-image" required placeholder="مثال: اسم الصورة أو الرابط الخاص بها">
                    </div>
                    <button type="submit" class="btn-submit">تأكيد الإضافة للمتجر ➕</button>
                </form>
            </div>
        </div>

        <div class="admin-box">
            <h3>إدارة معروضات المتجر</h3>
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>الصورة</th>
                            <th>الاسم</th>
                            <th>القسم</th>
                            <th>السعر</th>
                            <th>تحكم</th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-table">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // تشغيل دالة ملء جدول الأدمن تلقائياً عند تحميل الصفحة
        if (typeof displayAdminProducts === 'function') {
            displayAdminProducts();
        }
    </script>
</body>
</html>
